<!DOCTYPE html>
<html>
  <head>
    <title>Login – E-lib Store</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: Arial, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #e8e6f0;
      }

      .page {
        display: flex;
        width: 820px;
        min-height: 520px;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 6px 32px rgba(0,0,0,0.10);
      }

      /* ── Left panel ── */
      .left-panel {
        width: 42%;
        background: #2e2b4a;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 48px 40px;
        position: relative;
        overflow: hidden;
      }

      .left-panel::before {
        content: '';
        position: absolute;
        top: -80px; left: -80px;
        width: 260px; height: 260px;
        border-radius: 50%;
        background: rgba(83,74,183,0.2);
      }

      .left-panel::after {
        content: '';
        position: absolute;
        bottom: -60px; right: -60px;
        width: 200px; height: 200px;
        border-radius: 50%;
        background: rgba(29,158,117,0.15);
      }

      .brand-icon {
        width: 48px; height: 48px;
        background: rgba(174,169,236,0.18);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1.5rem;
        position: relative;
        z-index: 1;
      }

      .brand-icon i { font-size: 26px; color: #c8c4f0; }

      .brand-name {
        font-size: 22px;
        font-weight: 600;
        color: #eeedf8;
        margin-bottom: 0.5rem;
        position: relative;
        z-index: 1;
      }

      .brand-tagline {
        font-size: 14px;
        color: #a8a4cc;
        line-height: 1.7;
        position: relative;
        z-index: 1;
      }

      .books-deco {
        margin-top: 2.5rem;
        position: relative;
        z-index: 1;
      }

      /* ── Right panel ── */
      .right-panel {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 48px 40px;
        background: #f2f0f7;
      }

      .form-container { width: 100%; max-width: 320px; }

      .form-title {
        font-size: 22px;
        font-weight: 600;
        color: #2e2b4a;
        margin-bottom: 6px;
      }

      .form-subtitle {
        font-size: 14px;
        color: #7a7896;
        margin-bottom: 2rem;
      }

      /* ── Fields ── */
      .field { margin-bottom: 1.2rem; }

      .field label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #4a4868;
        margin-bottom: 6px;
      }

      .input-wrap { position: relative; }

      .input-wrap .icon-left {
        position: absolute;
        left: 12px; top: 50%;
        transform: translateY(-50%);
        font-size: 17px;
        color: #9b99b8;
        pointer-events: none;
      }

      .input-wrap input {
        width: 100%;
        height: 42px;
        padding: 0 40px 0 38px;
        border: 1px solid #d4d2e3;
        border-radius: 8px;
        background: #eceaf4;
        color: #2e2b4a;
        font-size: 14px;
        font-family: Arial, sans-serif;
        transition: border-color 0.15s, box-shadow 0.15s;
        outline: none;
      }

      .input-wrap input:focus {
        border-color: #6c63b8;
        box-shadow: 0 0 0 3px rgba(108,99,184,0.12);
        background: #ebe9f5;
      }

      .input-wrap input.invalid {
        border-color: #c0504a;
      }

      .toggle-pw {
        position: absolute;
        right: 12px; top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: #9b99b8;
        padding: 0;
        font-size: 17px;
        line-height: 1;
      }

      .toggle-pw:hover { color: #6c63b8; }

      .error-msg {
        display: none;
        font-size: 12px;
        color: #c0504a;
        margin-top: 5px;
      }

      .error-msg.visible { display: block; }

      /* ── Forgot link ── */
      .forgot {
        display: block;
        text-align: right;
        font-size: 12px;
        color: #6c63b8;
        text-decoration: none;
        margin-top: -8px;
        margin-bottom: 1.5rem;
      }

      .forgot:hover { text-decoration: underline; }

      /* ── Submit button ── */
      .submit-btn {
        width: 100%;
        height: 42px;
        background: #4e4798;
        color: #eeedf8;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        font-family: Arial, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: background 0.15s, transform 0.1s;
      }

      .submit-btn:hover { background: #3b3478; }
      .submit-btn:active { transform: scale(0.98); }
      .submit-btn i { font-size: 18px; }

      /* ── Divider ── */
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 1.5rem 0 1.2rem;
      }

      .divider span { font-size: 12px; color: #b0aec8; white-space: nowrap; }

      .divider::before,
      .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: #d4d2e3;
      }

      /* ── Register link ── */
      .register-link {
        text-align: center;
        font-size: 14px;
        color: #7a7896;
      }

      .register-link a {
        color: #6c63b8;
        text-decoration: none;
        font-weight: 600;
      }

      .register-link a:hover { text-decoration: underline; }

      /* ── Responsive ── */
      @media (max-width: 640px) {
        .page { flex-direction: column; width: 95%; min-height: unset; }
        .left-panel { width: 100%; padding: 32px 28px; }
        .books-deco { display: none; }
        .right-panel { padding: 32px 28px; }
      }
    </style>
  </head>
  <body>

    <div class="page">

      <!-- Left branding panel -->
      <div class="left-panel">
        <div class="brand-icon"><i class="ti ti-books"></i></div>
        <div class="brand-name">E-lib Store</div>
        <div class="brand-tagline">Your digital library, always open.<br>Browse, borrow, and read thousands of books.</div>
        <div class="books-deco">
          <svg width="150" height="95" viewBox="0 0 150 95" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="0"   y="15" width="18" height="75" rx="3" fill="#534AB7" opacity="0.7"/>
            <rect x="2"   y="15" width="3"  height="75" rx="1" fill="#AFA9EC" opacity="0.3"/>
            <rect x="22"  y="5"  width="22" height="85" rx="3" fill="#0F6E56" opacity="0.7"/>
            <rect x="24"  y="5"  width="3"  height="85" rx="1" fill="#5DCAA5" opacity="0.3"/>
            <rect x="48"  y="22" width="16" height="68" rx="3" fill="#7a3c1d" opacity="0.7"/>
            <rect x="50"  y="22" width="2.5" height="68" rx="1" fill="#c07a5a" opacity="0.3"/>
            <rect x="68"  y="10" width="20" height="80" rx="3" fill="#534AB7" opacity="0.45"/>
            <rect x="70"  y="10" width="3"  height="80" rx="1" fill="#CECBF6" opacity="0.2"/>
            <rect x="92"  y="30" width="14" height="60" rx="3" fill="#0F6E56" opacity="0.5"/>
            <rect x="110" y="18" width="18" height="72" rx="3" fill="#7a3c1d" opacity="0.55"/>
            <rect x="132" y="12" width="14" height="78" rx="3" fill="#3C3489" opacity="0.6"/>
            <rect x="0"   y="92" width="150" height="2" rx="1" fill="#AFA9EC" opacity="0.15"/>
          </svg>
        </div>
      </div>

      <!-- Right form panel -->
      <div class="right-panel">
        <div class="form-container">
          <h1 class="form-title">Welcome back</h1>
          <p class="form-subtitle">Sign in to your account to continue reading.</p>

          <form name="myForm" action="LoginChecker" method="post" onsubmit="return handleSubmit(event)" novalidate>

            <div class="field">
              <label for="username">Username</label>
              <div class="input-wrap">
                <i class="ti ti-user icon-left"></i>
                <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="username" />
              </div>
              <span class="error-msg" id="username-err">Username cannot be empty.</span>
            </div>

            <div class="field">
              <label for="password">Password</label>
              <div class="input-wrap">
                <i class="ti ti-lock icon-left"></i>
                <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" />
                <button type="button" class="toggle-pw" aria-label="Show password" onclick="togglePw(this)">
                  <i class="ti ti-eye"></i>
                </button>
              </div>
              <span class="error-msg" id="password-err">Password cannot be empty.</span>
            </div>

            <a href="#" class="forgot">Forgot password?</a>

            <button type="submit" class="submit-btn">
              <i class="ti ti-login"></i>
              Sign in
            </button>

            <div class="divider"><span>new here?</span></div>

            <div class="register-link">
              Don't have an account? <a href="registration.html">Register</a>
            </div>

          </form>
        </div>
      </div>

    </div>

    <script>
      function handleSubmit(e) {
        var valid = true;
        var u    = document.getElementById('username');
        var p    = document.getElementById('password');
        var uErr = document.getElementById('username-err');
        var pErr = document.getElementById('password-err');

        u.classList.remove('invalid');
        p.classList.remove('invalid');
        uErr.classList.remove('visible');
        pErr.classList.remove('visible');

        if (!u.value.trim()) {
          u.classList.add('invalid');
          uErr.classList.add('visible');
          valid = false;
        }
        if (!p.value.trim()) {
          p.classList.add('invalid');
          pErr.classList.add('visible');
          valid = false;
        }

        if (!valid) e.preventDefault();
        return valid;
      }

      function togglePw(btn) {
        var input = btn.closest('.input-wrap').querySelector('input');
        var icon  = btn.querySelector('i');
        if (input.type === 'password') {
          input.type = 'text';
          icon.className = 'ti ti-eye-off';
          btn.setAttribute('aria-label', 'Hide password');
        } else {
          input.type = 'password';
          icon.className = 'ti ti-eye';
          btn.setAttribute('aria-label', 'Show password');
        }
      }
    </script>

  </body>
</html>
